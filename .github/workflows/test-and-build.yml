name: Test and Build

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      # Scoped to the new variant code. Full-repo `pnpm run lint` has ~450
      # pre-existing errors (Node globals in /scripts not covered by eslint.config.js);
      # that cleanup is out of scope for this PR and tracked separately.
      - name: Lint variant code
        run: pnpm run lint:modern

  unit:
    name: Unit tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm run test

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build (includes verify-z-classes)
        run: pnpm run build

  e2e:
    name: E2E tests
    needs: [unit, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium
      # Behavior/e2e on localhost. The prod-targeted affiliate-tracking suite and the
      # visual specs are excluded via testIgnore in playwright.config.js.
      - name: E2E tests
        run: pnpm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual:
    name: Visual baselines (bootstrap)
    needs: e2e
    runs-on: ubuntu-latest
    # The committed baselines are macOS-rendered; Linux CI font rendering differs, so a
    # straight compare would always fail. This job GENERATES Linux-native baselines and
    # uploads them as an artifact (always green). Download + commit those, then switch the
    # step below from `test:visual:update` to `test:visual` to make visual a real gate.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium
      - name: Generate Linux visual baselines
        run: pnpm run test:visual:update
      - name: Upload Linux baselines
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux
          path: tests/visual/**/*.png
          retention-days: 14

  mass-edit-check:
    name: Mass-edit moratorium check (#366, expires 2026-07-15)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check post JSON modification count
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-mass-edit.mjs --base origin/${{ github.base_ref }}
